version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
    volumes:
      - postgres-data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: postgres
    depends_on:
      - postgres
    volumes:
      - metabase-data:/metabase-data

  metabase-mcp:
    image: mcp/metabase:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      METABASE_URL: http://metabase:3000
      METABASE_SESSION_TOKEN: mb_A/iuY4R7QcuDa59p2o3oT5F6+3dFdg56bbAlMN8j6v0=
    depends_on:
      - metabase

volumes:
  postgres-data:
  metabase-data: