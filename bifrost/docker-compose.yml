version: "3.9"

services:
  bifrost:
    image: maximhq/bifrost:latest
    container_name: bifrost-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"         # Web UI + HTTP API
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8080
      - LOG_LEVEL=info
      - LOG_STYLE=pretty

      # e.g. provider config
      # - OPENAI_API_KEY=${OPENAI_API_KEY}

    volumes:
      - bifrost_data:/app/data  # Persist config + workspace

# ✔ named volume declaration
volumes:
  bifrost_data: